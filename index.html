<!DOCTYPE html>
<html lang="en)
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostra Graphics | Professional Portfolio & Design Services</title>
	<link rel="icon" type="image/png" href="nostra.png">
    <style>
        /* Basic Reset and Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* Navigation Men;eeeu */
        nav {
            background-color: rgba(26, 26, 26, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #a777e3;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s, transform 0.2s;
            display: inline-block;
        }
        nav a:hover {
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Header / Hero Section */
        header {
            padding: 140px 20px;
			background-image: url('https://images.unsplash.com/photo-1507499739999-097706ad8914?auto=format&fit=crop&w=1600&q=80');
			background-size: cover;
			background-position: center;
			position: relative;
			overflow: hidden;
        }
		.header-glass {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            max-width: 650px;
            margin: 0 auto;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInHero 1.2s ease-out;
		}
        header h1 {
            margin: 0;
            font-size: 3.2rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            font-size: 1.25rem;
            min-height: 1.6em;
            margin-top: 15px;
            color: #ddd;
        }

        /* Layout Container and Scroll Animate Targets */
        .container {
            max-width: 1000px;
            margin: 100px auto;
            padding: 0 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        h2 {
            border-bottom: 2px solid #a777e3;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .section-subtitle {
            color: #aaa;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        /* Call To Action Buttons */
        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 14px 30px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(167, 119, 227, 0.3);
            transition: all 0.3s ease;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(167, 119, 227, 0.5);
        }

        /* Contact Form Styles */
        form {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            background-color: #1e1e1e;
            padding: 35px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }
        form:focus-within {
            border-color: #a777e3;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            background-color: #121212;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            border-color: #6e8efb;
            outline: none;
            background-color: #161616;
        }
        .submit-btn {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(167, 119, 227, 0.4);
        }

        @keyframes fadeInHero {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            background-color: #1a1a1a;
            padding: 30px 20px;
            margin-top: 100px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Nostra Graphics Designs</div>
        <ul>
            <li><a href="#" style="color: #ffffff;">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="work.html">Work</a></li>
            <li><a href="#contact" data-scroll>Contact</a></li>
        </ul>
    </nav>

    <header>
        <div class="header-glass">
            <h1>Nostra Graphics</h1>
            <p id="typewriter"></p>
            <a href="services.html" class="cta-btn">Explore Packages</a>
        </div>
    </header>

    <div class="container" id="contact">
        <h2>Let's Work Together</h2>
        <p class="section-subtitle">Have a project in mind? Fill out the form below and I'll get back to you as soon as possible.</p>
        
        <form action="https://formspree.io/f/mlgklloa" method="POST" id="contactForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="_replyto" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label for="message">Project Details</label>
                <textarea id="message" name="message" rows="5" required placeholder="Tell me about your design needs... (e.g., project type, target audience, preferred timelines)"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer>
        &copy; 2026 [Nostra Graphics]. All rights reserved.
    </footer>

    <script>
        // Smooth scroll for internal elements
        document.querySelectorAll('[data-scroll]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetElement = document.querySelector(this.getAttribute('href'));
                const navHeight = document.querySelector('nav').offsetHeight;
                window.scrollTo({
                    top: targetElement.getBoundingClientRect().top + window.pageYOffset - navHeight - 20,
                    behavior: 'smooth'
                });
            });
        });

        // Typewriter Animation logic
        const typewriterElement = document.getElementById('typewriter');
        const phrases = [
            "Transforming complex brand visions into compelling digital assets.",
            "Crafting clean, conversion-focused layout designs.",
            "Tailored creative solutions for forward-thinking brands."
        ];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            typewriterElement.textContent = isDeleting 
                ? currentPhrase.substring(0, charIndex - 1) 
                : currentPhrase.substring(0, charIndex + 1);
            charIndex = isDeleting ? charIndex - 1 : charIndex + 1;

            let typeSpeed = isDeleting ? 15 : 35;
            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500;
            }
            setTimeout(type, typeSpeed);
        }

        // Scroll Reveal Animations Engine
        const containers = document.querySelectorAll('.container');
        const revealOnScroll = () => {
            containers.forEach(container => {
                if (container.getBoundingClientRect().top < (window.innerHeight / 5) * 4.3) {
                    container.classList.add('visible');
                }
            });
        };

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(type, 500);
            window.addEventListener('scroll', revealOnScroll);
            revealOnScroll();

            // Form dynamic handling parameter query mapping
            const urlParams = new URLSearchParams(window.location.search);
            const selectedService = urlParams.get('service');
            if (selectedService) {
                const textarea = document.getElementById('message');
                textarea.value = `Hi! I would like to inquire regarding your "${selectedService}" package items. Let's discuss details about our scope...`;
                setTimeout(() => {
                    document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
                    textarea.focus();
                }, 600);
            }
        });
    </script>
</body>
</html>
